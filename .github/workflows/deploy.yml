name: Deploy static site to GitHub Pages

on:
  push:
    branches:
      - main
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install data updater dependencies
        run: npm install --no-audit --no-fund

      - name: Install browser for WBGT capture
        run: npx playwright install chromium
        timeout-minutes: 5

      - name: Update WBGT data
        run: node scripts/update-wbgt-data.mjs
        timeout-minutes: 2
        env:
          WBGT_LOGIN_ID: ${{ secrets.WBGT_LOGIN_ID }}
          WBGT_PASSWORD: ${{ secrets.WBGT_PASSWORD }}
          WBGT_BASE_URL: https://takanabe.aimnextiot.com/wbgtmonitoring/
          WBGT_TARGET_URL: ${{ secrets.WBGT_TARGET_URL }}
          WBGT_DATA_URL: ${{ secrets.WBGT_DATA_URL }}
          WBGT_DATA_AUTHORIZATION: ${{ secrets.WBGT_DATA_AUTHORIZATION }}

      - name: Clean data updater dependencies
        run: rm -rf node_modules package-lock.json

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
